services:
  - type: web
    name: senegal-agent-ia-api
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: gunicorn senegal_agent_ia.wsgi:application
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: senegal-agent-ia-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11.4"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://votre-app-flutter.onrender.com,https://votre-app-flutter.vercel.app"

databases:
  - name: senegal-agent-ia-db
    databaseName: senegal_agent_ia
    user: senegal_agent_ia_user
