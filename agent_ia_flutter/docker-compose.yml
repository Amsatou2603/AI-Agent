version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        API_URL: ${API_URL:-https://votre-api-django.com}
    container_name: agent_ia_flutter
    ports:
      - "8080:80"
    environment:
      - NGINX_HOST=localhost
      - NGINX_PORT=80
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
